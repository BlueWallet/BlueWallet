name: BuildReleaseApk 

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches:
      - master

jobs:
  buildReleaseApk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Docker
        run: docker version

      - name: Free disk space
        run: |
          df -h
          rm -rf /usr/share/dotnet || true
          rm -rf /opt/ghc || true
          rm -rf /usr/local/share/boost || true
          docker system prune -af || true
          df -h
      
      - name: Generate Build Number based on timestamp
        id: build_number
        run: |
          NEW_BUILD_NUMBER="$(date +%s)"
          echo "NEW_BUILD_NUMBER=$NEW_BUILD_NUMBER" >> $GITHUB_ENV
          echo "build_number=$NEW_BUILD_NUMBER" >> $GITHUB_OUTPUT


      - name: Build APK inside Docker
        env:
          KEYSTORE_FILE_HEX: ${{ secrets.KEYSTORE_FILE_HEX }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          chmod +x reproducible-builds/build-apk.sh
          ./reproducible-builds/build-apk.sh

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            android/**/*.log
            android/**/build/**/*.log
            android/**/outputs/logs/**/*.log
            android/**/reports/**/*.log
          if-no-files-found: warn

      - name: Determine APK Filename and Path
        id: determine_apk_path
        run: |
          BUILD_NUMBER=${{ steps.build_number.outputs.build_number }}
          VERSION_NAME=$(grep versionName android/app/build.gradle | awk '{print $2}' | tr -d '"')
          BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}
          BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9_-]/_/g')

          if [ -n "$BRANCH_NAME" ] && [ "$BRANCH_NAME" != "master" ]; then
            EXPECTED_FILENAME="BlueWallet-${VERSION_NAME}-${BUILD_NUMBER}-${BRANCH_NAME}.apk"
          else
            EXPECTED_FILENAME="BlueWallet-${VERSION_NAME}-${BUILD_NUMBER}.apk"
          fi
      
          echo "EXPECTED_FILENAME=${EXPECTED_FILENAME}" >> $GITHUB_ENV


      - name: Find APK
        run: |
          APK_PATH=$(find reproducible-builds/build -maxdepth 1 -name "*.apk" -print -quit)

          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            ls -R reproducible-builds/build
            exit 1
          fi

          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Rename APK
        run: |
          FINAL_PATH="reproducible-builds/build/${EXPECTED_FILENAME}"

          mv "$APK_PATH" "$FINAL_PATH"

          echo "APK_PATH=$FINAL_PATH" >> $GITHUB_ENV

      - name: Upload APK as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: signed-apk
          path: ${{ env.APK_PATH }}
          if-no-files-found: error

